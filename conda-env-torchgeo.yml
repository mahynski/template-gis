name: torchgeo
channels:
  - conda-forge
dependencies:
  - python=3.10
  - conda-forge::gdal # For terratorch
  - pip
  - pip:
    - ipykernel # Must be specified for .devcontainers to work correctly
    - notebook # Must be specified for .devcontainers to work correctly
    - ipywidgets
    - matplotlib
    - numpy
    - pandas
    - scipy
    - scikit-learn
    - torch-summary
    - tensorboard
    - torchgeo==0.6.2
    - git+https://github.com/IBM/terratorch.git@0.99.9post1
    - mlflow
